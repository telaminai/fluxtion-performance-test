dimension: deep_path
title: "Deep Single-Path Chain"
description: >
  A strictly linear chain of BaseNodes with a single upstream dependency each.
  Tests raw latency scaling with depth. No branching, no diamond joins.
  Demonstrates that Fluxtion's compiled flat dispatcher scales O(n) with depth
  while dynamic frameworks pay additional overhead per node from vtable lookups
  and observer list traversal.
rootEventClass: com.telamin.fluxtion.test.performance.events.MarketDataEvent
sizes: [5, 10, 20, 50, 100]
generatorClass: com.telamin.fluxtion.test.performance.generators.DeepPathGraphGenerator
generatedPackage: com.telamin.fluxtion.test.performance.generated.deep
params:
  nodeClass: com.telamin.fluxtion.test.performance.nodes.BaseNode
  rootNodeClass: com.telamin.fluxtion.test.performance.nodes.MarketDataRootNode
  sinkNodeClass: com.telamin.fluxtion.test.performance.nodes.PublisherNode
