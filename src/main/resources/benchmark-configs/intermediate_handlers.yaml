dimension: intermediate_handlers
title: "Intermediate Node Event Handling"
description: >
  A graph where TradeSignalEvent is handled not just at the root but also by
  intermediate nodes at every Nth layer. This creates multiple independent event
  entry points within the same graph. Fluxtion infers separate execution paths
  for each entry point at compile time, merging them correctly in rank order.
  Dynamic frameworks must check all registered handlers on every event, paying
  a linear scan cost proportional to the total number of handlers regardless
  of which ones actually respond.
rootEventClass: com.telamin.fluxtion.test.performance.events.TradeSignalEvent
sizes: [10, 20, 50, 100]
generatorClass: com.telamin.fluxtion.test.performance.generators.IntermediateHandlersGraphGenerator
generatedPackage: com.telamin.fluxtion.test.performance.generated.intermediate
params:
  rootNodeClass: com.telamin.fluxtion.test.performance.nodes.TradeSignalRootNode
  midHandlerNodeClass: com.telamin.fluxtion.test.performance.nodes.TradeSignalRootNode
  baseNodeClass: com.telamin.fluxtion.test.performance.nodes.BaseNode
  sinkNodeClass: com.telamin.fluxtion.test.performance.nodes.PublisherNode
  handlerEveryNLayers: 5
