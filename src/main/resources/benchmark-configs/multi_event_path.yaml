dimension: multi_event_path
title: "Multiple Event Types — Independent Execution Paths"
description: >
  A single compiled processor containing three completely independent execution
  paths, one per event type: MarketDataEvent, TradeSignalEvent, and ControlEvent.
  Each path is a linear chain of `size` nodes fed by its own root handler.

  When a MarketDataEvent fires, only the market-data chain executes; the other
  two chains are structurally invisible to the dispatch routine for that event.
  Fluxtion derives these disjoint paths at compile time and generates a separate
  dispatch method per event type — no runtime branching or instanceof checks
  needed to find the correct chain.

  This dimension specifically isolates the cost of type-based dispatch:
    - Fluxtion: direct static call to the correct handleEvent(T) overload.
    - RxJava:   requires three separate PublishProcessor / Flowable chains,
                each independently allocated and traversed on every event.

  The benchmark fires all three event types in round-robin (seq % 3 routing)
  so the average latency covers all three paths equally.

  Key measurement: GC allocation per operation (-prof gc).
  Fluxtion reuses pre-allocated event objects and allocates nothing internally,
  so allocation must be 0 B/op. RxJava incurs allocation on every onNext().

rootEventClass: com.telamin.fluxtion.test.performance.events.MarketDataEvent
sizes: [5, 10, 20, 50]
generatorClass: com.telamin.fluxtion.test.performance.generators.MultiEventPathGraphGenerator
generatedPackage: com.telamin.fluxtion.test.performance.generated.multievent
params:
  marketDataNodeClass: com.telamin.fluxtion.test.performance.nodes.BaseNode
  tradeSignalNodeClass: com.telamin.fluxtion.test.performance.nodes.AccumulatorNode
  controlNodeClass: com.telamin.fluxtion.test.performance.nodes.FilteringNode
  marketDataRootClass: com.telamin.fluxtion.test.performance.nodes.MarketDataRootNode
  tradeSignalRootClass: com.telamin.fluxtion.test.performance.nodes.TradeSignalRootNode
  controlRootClass: com.telamin.fluxtion.test.performance.nodes.ControlRootNode
  sinkNodeClass: com.telamin.fluxtion.test.performance.nodes.PublisherNode
