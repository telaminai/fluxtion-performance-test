dimension: diamond_mesh
title: "Diamond Mesh — Topological Coordination"
description: >
  A complex graph where nodes have multiple upstreams forming a diamond topology.
  Tests Fluxtion's AOT-compiled execution schedule vs. RxJava's zip/share overhead.
  In this graph, node N depends on node N-1 AND the root, forcing coordination
  at every level.
rootEventClass: com.telamin.fluxtion.test.performance.events.MarketDataEvent
sizes: [101]
generatorClass: com.telamin.fluxtion.test.performance.generators.DiamondMeshGraphGenerator
generatedPackage: com.telamin.fluxtion.test.performance.generated.diamond
params:
  nodeClass: com.telamin.fluxtion.test.performance.nodes.BaseNode
  rootNodeClass: com.telamin.fluxtion.test.performance.nodes.MarketDataRootNode
  sinkNodeClass: com.telamin.fluxtion.test.performance.nodes.PublisherNode
