dimension: hot_path
title: "Multiple Paths — Hot Path"
description: >
  A graph with N parallel branches fanning out from the root, but only the
  first branch ("hot path") actually fires on each event — the others are
  silenced by a FilteringNode with a threshold that is never crossed.
  Measures selective sub-graph propagation: Fluxtion evaluates a cheap boolean
  guard per branch and short-circuits; dynamic frameworks must still traverse
  their listener lists for all branches before discarding.
rootEventClass: com.telamin.fluxtion.test.performance.events.MarketDataEvent
sizes: [2, 4, 8, 16, 32]
generatorClass: com.telamin.fluxtion.test.performance.generators.HotPathGraphGenerator
generatedPackage: com.telamin.fluxtion.test.performance.generated.hotpath
params:
  hotBranchDepth: 10
  coldBranchDepth: 5
  rootNodeClass: com.telamin.fluxtion.test.performance.nodes.MarketDataRootNode
  hotNodeClass: com.telamin.fluxtion.test.performance.nodes.AccumulatorNode
  coldNodeClass: com.telamin.fluxtion.test.performance.nodes.FilteringNode
  coldThreshold: 1.0e15
  sinkNodeClass: com.telamin.fluxtion.test.performance.nodes.PublisherNode
