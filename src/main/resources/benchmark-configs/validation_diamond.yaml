dimension: validation_diamond
title: "Validation - ID-filtered diamond mesh with multi-event routing"
description: >
  A layered diamond mesh with three independent chains (MarketData, TradeSignal, Control),
  each using overlapping fan-in to create the "diamond problem". All nodes check whether
  their ID is in the current event's activeIds set and return true/false to control
  propagation. Shared EventContext and DataCollector beans allow tests to inspect exactly
  which nodes fired and in what order.

  Validates five key properties simultaneously:
    1. Glitch-free execution: each node fires exactly once per cycle (rank ordering).
    2. Selective propagation: nodes NOT in activeIds arrest their downstream sub-graph.
    3. Multi-event dispatch: firing MarketDataEvent never touches Trade or Control chains.
    4. Polymorphic propagation: ValidationBaseNode and ValidationAccumulatorNode both
       honour the isIdPropagating() contract inherited from ValidationNodeBase.
    5. Stateful correctness: AccumulatorNode accumulates across cycles; DataCollector
       history proves state is consistent across many event cycles.

  size = number of hidden layers in the MarketData diamond chain.
  TradeSignal chain depth = size/2; Control chain depth = max(2, size/3).

rootEventClass: com.telamin.fluxtion.test.performance.validation.events.ValidationMarketEvent
sizes: [3, 5, 10]
generatorClass: com.telamin.fluxtion.test.performance.validation.generator.ValidationDiamondGenerator
